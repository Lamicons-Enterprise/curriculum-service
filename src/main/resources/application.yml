spring:
  application:
    name: CURRICULUM-SERVICE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lamicons}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Atul2192}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      continue-on-error: true
      platform: postgresql

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  cloud:
    compatibility-verifier:
      enabled: false

server:
  port: 8082
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

# Swagger
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    disable-swagger-default-url: true
    display-request-duration: true

# AWS S3 Configuration
aws:
  s3:
    enabled: true
    access-key: 
    secret-key: 
    region: ap-south-1
    bucket-name: 
    prefix: dummy

# File Upload Configuration
file:
  upload:
    max-size: 10MB
    allowed-image-types: image/jpeg,image/png
    allowed-video-types: video/mp4,video/mpeg,video/webm
    allowed-document-types: application/pdf

# Eureka (optional — won't crash if Eureka not running)
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

logging:
  level:
    root: WARN
    org.springframework: WARN
    org.hibernate: WARN
    org.hibernate.SQL: OFF
    com.netflix.discovery: WARN
    org.springframework.cloud: WARN
    org.springframework.data.redis: ERROR
    com.Lamicons: INFO
