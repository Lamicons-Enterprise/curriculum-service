spring:
  application:
    name: Curriculum-Service

  datasource:
    url: jdbc:postgresql://localhost:5432/lamicons
    username: db_username
    password: db_password
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      continue-on-error: true
      platform: postgresql

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

  cloud:
    compatibility-verifier:
      enabled: false

# RabbitMQ custom properties
rabbitmq:
  exchange:
    name: lamicons.notification.exchange
  routing-key:
    batch-assignment: curriculum.batch.assignment

server:
  port: 8082
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

# Swagger
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    disable-swagger-default-url: true
    display-request-duration: true

# AWS S3 Configuration (Dummy values for local testing)
aws:
  s3:
    enabled: true
    access-key: dummy
    secret-key: dummy
    region: ap-south-1
    bucket-name: dummy-bucket
    prefix: dummy

# File Upload Configuration
file:
  upload:
    max-size: 10MB
    allowed-image-types: image/jpeg,image/png
    allowed-video-types: video/mp4,video/mpeg,video/webm
    allowed-document-types: application/pdf

# Eureka (optional — won't crash if Eureka not running)
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

