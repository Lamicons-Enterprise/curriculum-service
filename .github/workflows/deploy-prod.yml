name: Deploy Curriculum Service to Production

on:
  push:
    branches:
      - prod
  pull_request:
    branches:
      - prod
    types:
      - closed

jobs:
  deploy:
    # Only run on push to prod or when PR is merged to prod
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lamicons-enterprise/lamicons-curriculum-service
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            prod

      - name: Build and Push Curriculum Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/lamicons-enterprise/lamicons-curriculum-service:prod
          cache-from: type=registry,ref=ghcr.io/lamicons-enterprise/lamicons-curriculum-service:buildcache
          cache-to: type=registry,ref=ghcr.io/lamicons-enterprise/lamicons-curriculum-service:buildcache,mode=max
          build-args: |
            SPRING_PROFILES_ACTIVE=prod
            APP_VERSION=${{ github.sha }}

      - name: Deploy to Contabo VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            
            echo "🚀 Starting Curriculum Service deployment..."
            
            # Navigate to deployment directory
            cd /opt/lamicons
            
            # Login to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the latest image
            echo "📦 Pulling latest Curriculum Service image..."
            docker pull ghcr.io/lamicons-enterprise/lamicons-curriculum-service:prod
            
            # Use docker compose to restart the service
            echo "🔄 Restarting curriculum-service via docker compose..."
            docker compose pull curriculum-service
            docker compose up -d --force-recreate --no-deps curriculum-service
            
            # Wait for container to start
            echo "⏳ Waiting for container to start..."
            sleep 15
            
            # Clean up old images
            echo "🧹 Cleaning up old images..."
            docker image prune -af --filter "until=24h"
            
            # Logout from GHCR
            docker logout ghcr.io
            
            echo "✅ Curriculum Service deployed successfully!"
            echo "📊 Service status:"
            docker compose ps curriculum-service
            
            echo "📋 Recent logs:"
            docker compose logs --tail 20 curriculum-service
